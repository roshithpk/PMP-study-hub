<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMP Study Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
body{font-family:'DM Sans',sans-serif;background:#f4f2ed;margin:0}

/* SIMPLE CLEAN VERSION (keeping your core UI) */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;padding:40px}
.card{
  background:#fff;
  border-radius:20px;
  padding:30px;
  text-decoration:none;
  color:#000;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  transition:.3s;
}
.card:hover{transform:translateY(-6px)}
.cbadge{background:#00b090;color:#fff;padding:5px 10px;border-radius:20px;font-size:12px}
.cnum{margin-top:10px;font-size:12px;color:#3d15f0}
.ctitle{font-size:20px;font-weight:800;margin:10px 0}
.cdesc{font-size:14px;color:#555;margin-bottom:20px}
.cfoot{display:flex;justify-content:space-between;align-items:center}
.clink{color:#3d15f0;font-weight:700}
.carr{background:#3d15f0;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center}
</style>
</head>

<body>

<h2 style="padding:30px">PMP Study Hub</h2>

<div class="cards">

<!-- ✅ LESSON 2 (WORKING) -->

   target="_blank"
   class="card">

  <span class="cbadge">✓ Ready</span>

  <div class="cnum">LESSON 02</div>

  <div class="ctitle">Start the Project</div>

  <div class="cdesc">
    Identify stakeholders, form the team, and choose your project approach.
  </div>

  <div class="cfoot">
    <span class="clink">Open PDF</span>
    <div class="carr">→</div>
  </div>
</a>


<!-- Lesson 3 (placeholder) -->

  <span class="cbadge">Coming Soon</span>
  <div class="cnum">LESSON 03</div>

</div>
